name: Release

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - 'main'
  workflow_dispatch:

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Validate package version
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as f:
              pyproject_version = tomllib.load(f)["project"]["version"]

          with open("Cargo.toml", "rb") as f:
              cargo_version = tomllib.load(f)["package"]["version"]

          if pyproject_version != cargo_version:
              raise SystemExit(
                  f"Version mismatch: pyproject.toml={pyproject_version}, Cargo.toml={cargo_version}"
              )

          print(f"Validated release version {pyproject_version}")
          PY
      - id: version
        name: Determine release plan
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import subprocess
          import tomllib

          with open("pyproject.toml", "rb") as f:
              version = tomllib.load(f)["project"]["version"]

          tag = f"v{version}"
          subprocess.run(["git", "fetch", "--tags", "--force"], check=True)
          tag_exists = subprocess.run(
              ["git", "rev-parse", "-q", "--verify", f"refs/tags/{tag}"],
              check=False,
              capture_output=True,
              text=True,
          ).returncode == 0
          force_release = os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch"

          print(f"version={version}")
          print(f"tag={tag}")
          print(f"should_release={'true' if force_release or not tag_exists else 'false'}")
          PY

  linux:
    runs-on: ubuntu-latest
    needs: meta
    if: github.event_name == 'pull_request' || needs.meta.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build wheel and sdist
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-gnu
          args: --release --out dist --sdist
          sccache: 'true'
          manylinux: auto
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/*

  macos:
    runs-on: macos-latest
    needs: meta
    if: github.event_name == 'pull_request' || needs.meta.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: universal2-apple-darwin
          args: --release --out dist
          sccache: 'true'
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-macos
          path: dist/*

  windows:
    runs-on: windows-latest
    needs: meta
    if: github.event_name == 'pull_request' || needs.meta.outputs.should_release == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-pc-windows-msvc
          args: --release --out dist
          sccache: 'true'
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/*

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [meta, linux, macos, windows]
    if: github.event_name != 'pull_request' && needs.meta.outputs.should_release == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
      - name: Create and push release tag
        run: |
          git fetch --tags --force
          if git rev-parse -q --verify "refs/tags/${{ needs.meta.outputs.tag }}" >/dev/null; then
            echo "Tag ${{ needs.meta.outputs.tag }} already exists"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.meta.outputs.tag }}"
          git push origin "${{ needs.meta.outputs.tag }}"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: dist/*
